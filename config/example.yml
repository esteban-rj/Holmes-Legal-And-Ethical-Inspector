llm:
  provider: mock          # change to "minimax" to use the real provider
  model: MiniMax-M3
  # `thinking` is kept on the client for forward-compatibility with
  # providers that expose a separate thinking model variant. The `minimax`
  # provider exposes a single chat-completions model id (`MiniMax-M3`)
  # and rejects 400 on any `-thinking` suffix or on
  # `reasoning_effort` / `thinking` body fields, so we always invoke the
  # base model id and never forward those flags.
  thinking: true
  # Override the thinking model id when your provider exposes a different
  # name (defaults to `${model}-thinking`). Has no effect on `minimax`.
  thinking_model: null
  api_base: https://api.minimax.io/v1
  api_key_env: MINIMAX_API_KEY

agents:
  contracting:
    enabled: true
    confidence_threshold: 0.7
    internet_profile:
      kind: public_ro
      allowed_hosts:
        - "^secoop(?:\\..*)?$"
        - "^api\\.secop\\.gov\\.co$"
      explore_allowed_hosts:
        - "^secoop(?:\\..*)?$"
        - "^api\\.secop\\.gov\\.co$"
        - "^www\\.datos\\.gov\\.co$"
      # Set to `true` to remove the fetch_url / web_search host allow-list
      # for this agent (LLM may hit ANY host). Off by default — leaving
      # FR-019 ("no unrestricted internet") in force. Intended for trusted,
      # non-production environments (demos, local debugging).
      unrestricted_web: false
  logistics:
    enabled: true
    confidence_threshold: 0.6
    internet_profile:
      kind: public_ro
      allowed_hosts:
        - "^router\\.project-osrm\\.org$"
        - "^api\\.openrouteservice\\.org$"
      explore_allowed_hosts:
        - "^router\\.project-osrm\\.org$"
        - "^api\\.openrouteservice\\.org$"
        - "^nominatim\\.openstreetmap\\.org$"
      unrestricted_web: false
  medical:
    enabled: true
    confidence_threshold: 0.75
    internet_profile:
      kind: none
      # empty explore_allowed_hosts => LLM cannot make outbound calls,
      # only consult the local RAG knowledge base.
      explore_allowed_hosts: []
      unrestricted_web: false
  whistleblower:
    enabled: true
    confidence_threshold: 0.6
    internet_profile:
      kind: llm_only
      llm_endpoint: "${llm.api_base}"
      explore_allowed_hosts:
        - "^glossary\\.example\\.org$"

blackboard:
  dedup_window_seconds: 60
  staleness_window_seconds: 86400

investigations:
  default_timeout_seconds: 300
  consensus_evaluation_interval_seconds: 60
  rate_limit_per_minute: 10

auth:
  tokens:
    # demo token -> requester id mapping; replace in real deployments
    "demo-token-esteban": "user:esteban"
    "demo-token-auditor": "user:auditor"
